{% extends "frontend/base.html" %}
{% load static %}
{% block title %}Page Not Found - GrowScape{% endblock %}
{% block content %}
<style>
    nav, header, footer, .footer-section, .header-area {
        display: none !important;
    }
    
    /* Ensures the error message stays centered on the screen */
    .error-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
    }
</style>
    <!-- error section start -->
    <div class="error-page">
        <div class="container">
            <div class="row">
                <div class="error-page-image wow fadeInUp" data-wow-delay="0.25s">
                    <img src="images/404-error-img.png" alt="404 error illustration for Growscape website">
                </div>
                <div class="error-page-content">
                    <div class="error-page-content-heading">
                        <h2 class="text-anime-style-2" data-cursor="-opaque"><span>Oops!</span> Page Not Found</h2>
                    </div>
                    <div class="error-page-content-body">
                        <p class="wow fadeInUp" data-wow-delay="0.25s">The page you are looking for does not exist</p>
                        <a class="btn-default wow fadeInUp" data-wow-delay="0.5s" href="./">Back To Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- error section end -->
    
{% endblock %}
